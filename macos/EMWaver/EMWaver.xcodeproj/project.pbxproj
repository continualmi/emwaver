ver-dfu-helper\"\n  fi\nelse\n  echo \"[Bundle Firmware + Helpers] cargo not found; using prebuilt DFU helper\"\n  dfu_helper_src=\"${dfu_helper_src_prebuilt}\"\nfi\n\nesp_helper_src=\"\"\nif [ -n \"${python_bin}\" ] && \"${python_bin}\" -m PyInstaller --version >/dev/null 2>&1 && [ -f \"${esp_helper_build_script}\" ]; then\n  echo \"[Bundle Firmware + Helpers] building frozen emwaver-esp-helper via PyInstaller\"\n  \"${python_bin}\" \"${esp_helper_build_script}\"\n  esp_helper_src=\"${esp_helper_dist}\"\nelif [ -n \"${python_bin}\" ] && [ -f \"${esp_helper_source}\" ]; then\n  echo \"[Bundle Firmware + Helpers] PyInstaller not available; creating dev ESP helper wrapper with vendored Python deps\"\n  esp_helper_src=\"${TARGET_TEMP_DIR}/emwaver-esp-helper-dev\"\n  esp_helper_vendor=\"${esp_helper_src}/python\"\n  rm -rf \"${esp_helper_src}\"\n  mkdir -p \"${esp_helper_src}\" \"${esp_helper_vendor}\"\n  cp -f \"${esp_helper_source}\" \"${esp_helper_src}/emwaver_esp_helper.py\"\n  if [ ! -f \"${esp_helper_requirements}\" ]; then\n    echo \"[Bundle Firmware + Helpers] missing ESP helper requirements at ${esp_helper_requirements}\" >&2\n    exit 1\n  fi\n  \"${python_bin}\" -m pip install --upgrade --target \"${esp_helper_vendor}\" esptool pyserial\n  cat > \"${esp_helper_src}/emwaver-esp-helper\" <<EOF\n#!/bin/sh\nhelper_dir=\"\\$(CDPATH= cd -- \"\\$(dirname -- \"\\$0\")\" && pwd)\"\nexport PYTHONPATH=\"\\${helper_dir}/python\\${PYTHONPATH:+:\\${PYTHONPATH}}\"\nexec \"${python_bin}\" \"\\${helper_dir}/emwaver_esp_helper.py\" \"\\$@\"\nEOF\n  chmod +x \"${esp_helper_src}/emwaver-esp-helper\"\nelse\n  echo \"[Bundle Firmware + Helpers] PyInstaller not available; using prebuilt frozen ESP helper\"\n  esp_helper_src=\"${esp_helper_src_prebuilt}\"\nfi\n\necho \"[Bundle Firmware + Helpers] firmware_src=${firmware_src}\"\necho \"[Bundle Firmware + Helpers] dfu_helper_src=${dfu_helper_src}\"\necho \"[Bundle Firmware + Helpers] esp_helper_src=${esp_helper_src}\"\necho \"[Bundle Firmware + Helpers] dst_root=${dst_root}\"\n\ntest -f \"${firmware_src}\" || (echo \"Missing bundled firmware at: ${firmware_src}\" >&2; exit 1)\ntest -f \"${dfu_helper_src}\" || (echo \"Missing DFU helper at: ${dfu_helper_src}\" >&2; exit 1)\ntest -x \"${esp_helper_src}/emwaver-esp-helper\" || (echo \"Missing frozen ESP helper executable at: ${esp_helper_src}/emwaver-esp-helper\" >&2; exit 1)\n\nmkdir -p \"$(dirname \"${dst_firmware}\")\"\ncp -f \"${firmware_src}\" \"${dst_firmware}\"\n\nmkdir -p \"$(dirname \"${dst_dfu_helper}\")\"\ncp -f \"${dfu_helper_src}\" \"${dst_dfu_helper}\"\nchmod +x \"${dst_dfu_helper}\"\n\nrm -rf \"${dst_esp_helper_dir}\"\nmkdir -p \"$(dirname \"${dst_esp_helper_dir}\")\"\nditto \"${esp_helper_src}\" \"${dst_esp_helper_dir}\"\nchmod +x \"${dst_esp_helper_dir}/emwaver-esp-helper\"\n\nfor target in esp32 esp32s2 esp32s3; do\n  for kind in app bootloader partition-table ota-data; do\n    src=\"${repo_root}/firmware/emwaver-${target}-${kind}.bin\"\n    test -f \"${src}\" || (echo \"Missing ESP firmware at: ${src}\" >&2; exit 1)\n    cp -f \"${src}\" \"${dst_root}/emwaver-${target}-${kind}.bin\"\n  done\ndone\n";
