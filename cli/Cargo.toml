[package]
name = "emwaver-cli"
version = "0.1.0"
edition = "2024"

[dependencies]
anyhow = "1"
base64 = "0.22"
clap = { version = "4.5", features = ["derive"] }
directories = "5"
reqwest = { version = "0.11", features = ["json", "blocking"] }
rpassword = "7"
serde = { version = "1", features = ["derive"] }
serde_json = "1"
sha2 = "0.10"
walkdir = "2"
btleplug = "0.11"
tokio = { version = "1", features = ["rt-multi-thread", "macros", "signal", "time", "io-util", "io-std"] }
tokio-stream = "0.1"
uuid = { version = "1", features = ["macro-diagnostics"] }

[dev-dependencies]
assert_cmd = "2"
