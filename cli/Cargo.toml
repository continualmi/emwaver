[package]
name = "emw"
version = "0.1.0"
edition = "2024"

[[bin]]
name = "emwaver"
path = "src/main.rs"

[dependencies]
anyhow = "1"
clap = { version = "4.5", features = ["derive"] }
btleplug = "0.11"
include_dir = "0.7"
tokio = { version = "1", features = ["rt-multi-thread", "macros", "signal", "time", "io-util", "io-std"] }
tokio-stream = "0.1"
uuid = { version = "1", features = ["macro-diagnostics"] }

[dev-dependencies]
assert_cmd = "2"
