## IDF Component Manager Manifest File
dependencies:
  ## Required IDF version
  idf: "^5.0"
  espressif/esp_tinyusb:
    version: "^1.1"
    rules:
      - if: "target in [esp32s2, esp32s3]"
  espressif/tinyusb:
    version: "0.18.0~2"
    rules:
      - if: "target in [esp32s2, esp32s3]"
  espressif/mdns: "^1.8"
