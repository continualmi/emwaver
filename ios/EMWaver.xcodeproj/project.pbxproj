			runOnlyForDeploymentPostprocessing = 0;
			shellPath = /bin/sh;
			shellScript = "set -eu\n\nrepo_root=\"${SRCROOT}/..\"\noutput_plist=\"${SCRIPT_OUTPUT_FILE_0:-${TARGET_BUILD_DIR}/${UNLOCALIZED_RESOURCES_FOLDER_PATH}/EMWaverEnv.plist}\"\nconfiguration=\"${CONFIGURATION:-Debug}\"\n\nmkdir -p \"$(dirname \"${output_plist}\")\"\n\nexport EMWAVER_REPO_ROOT=\"${repo_root}\"\nexport EMWAVER_OUTPUT_PLIST=\"${output_plist}\"\nexport EMWAVER_CONFIGURATION=\"${configuration}\"\n\n/usr/bin/python3 <<'PY'\nimport os\nimport pathlib\nimport plistlib\nimport re\n\nrepo_root = pathlib.Path(os.environ[\"EMWAVER_REPO_ROOT\"]).resolve()\noutput_plist = pathlib.Path(os.environ[\"EMWAVER_OUTPUT_PLIST\"])\nconfiguration = os.environ.get(\"EMWAVER_CONFIGURATION\", \"Debug\").lower()\n\nenv_files = [\".env.prod\"] if configuration == \"release\" else [\".env\"]\n\ntoken = re.compile(r\"\\$\\{([A-Z0-9_]+)\\}\")\nresolved = {}\n\ndef expand(value: str) -> str:\n    out = value\n    for _ in range(4):\n        out = token.sub(lambda match: os.environ.get(match.group(1), resolved.get(match.group(1), \"\")), out)\n    return out.strip()\n\nfor rel in env_files:\n    path = repo_root / rel\n    if not path.exists():\n        continue\n    for raw in path.read_text(encoding=\"utf-8\").splitlines():\n        line = raw.strip()\n        if not line or line.startswith(\"#\") or \"=\" not in line:\n            continue\n        key, value = line.split(\"=\", 1)\n        key = key.strip()\n        if not key or key in resolved:\n            continue\n        resolved[key] = expand(value.strip())\n\nbundled = {}\nfor key, value in resolved.items():\n    if not key.startswith(\"EMWAVER_\"):\n        continue\n    runtime = os.environ.get(key, \"\").strip()\n    bundled[key] = runtime or value\n\nwith output_plist.open(\"wb\") as fh:\n    plistlib.dump(bundled, fh, sort_keys=True)\nPY\n";
