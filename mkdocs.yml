site_name: EMWaver
theme:
  name: material
  features:
    - navigation.tabs
  logo: logo.png
  favicon: logo.png
  toc:
    permalink: false
  palette:
    - scheme: default
      primary: indigo
      accent: indigo
      toggle:
        icon: material/weather-night
        name: Switch to dark mode
    - scheme: slate
      primary: indigo
      accent: indigo
      toggle:
        icon: material/weather-sunny
        name: Switch to light mode
extra:
  toc:
    sidebar: false
nav:
  - Home: https://emwavers.com/
  - Documentation: documentation.md
  - Firmware Update: firmware.md
  - Store: https://emwavers.com/store
  - App: https://emwavers.com/app
  - Certificates: https://emwavers.com/certificates

extra_css:
  - styles/hide-toc.css
markdown_extensions:
  - attr_list    # Allow attribute lists like {.class}
  - md_in_html   # Enable Markdown processing inside HTML blocks (needed for <div markdown>)
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg
