<!doctype html>
<html>
<head>
  <meta charset="utf-8" />
  <meta http-equiv="Content-Security-Policy" content="default-src 'self' https: data: blob:; style-src 'self' 'unsafe-inline' https:; script-src 'self' 'unsafe-eval' 'unsafe-inline' https:;" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <style>
    html, body, #container { height: 100%; width: 100%; margin: 0; padding: 0; background: #1e1e1e; }
  </style>
</head>
<body>
  <div id="container"></div>

  <!-- Monaco from CDN (initial bring-up). If you want offline-by-default, we'll bundle vs/* later. -->
  <script src="https://cdn.jsdelivr.net/npm/monaco-editor@0.45.0/min/vs/loader.js"></script>
  <script>
    let editor = null;
    let suppress = false;
    let pendingPush = null;

    function post(msg) {
      if (window.chrome && window.chrome.webview) {
        window.chrome.webview.postMessage(msg);
      }
    }

    function setText(text) {
      if (!editor) return;
      suppress = true;
      try {
        const model = editor.getModel();
        model.setValue(text || '');
      } finally {
        suppress = false;
      }
    }

    function setReadOnly(ro) {
      if (!editor) return;
      editor.updateOptions({ readOnly: !!ro });
    }

    function requestText() {
      if (!editor) return;
      post({ type: 'text', text: editor.getValue() });
    }

    function init() {
      require.config({ paths: { 'vs': 'https://cdn.jsdelivr.net/npm/monaco-editor@0.45.0/min/vs' } });
      require(['vs/editor/editor.main'], function () {
        editor = monaco.editor.create(document.getElementById('container'), {
          value: '',
          language: 'javascript',
          theme: 'vs-dark',
          fontFamily: 'Consolas, monospace',
          fontSize: 13,
          minimap: { enabled: false },
          scrollBeyondLastLine: false,
          automaticLayout: true,
          wordWrap: 'off'
        });

        editor.onDidChangeModelContent(function () {
          if (suppress) return;
          // debounce a little to avoid message spam
          if (pendingPush) clearTimeout(pendingPush);
          pendingPush = setTimeout(() => {
            pendingPush = null;
            post({ type: 'text', text: editor.getValue() });
          }, 80);
        });

        post({ type: 'ready' });
      });
    }

    window.chrome?.webview?.addEventListener('message', (event) => {
      const msg = event.data;
      if (!msg || !msg.type) return;
      if (msg.type === 'setText') setText(msg.text);
      if (msg.type === 'setReadOnly') setReadOnly(msg.readOnly);
      if (msg.type === 'getText') requestText();
    });

    init();
  </script>
</body>
</html>
