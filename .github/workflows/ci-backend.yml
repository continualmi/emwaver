name: CI Backend

on:
  pull_request:
    paths:
      - backend/**
      - requirements*.txt
      - .github/workflows/ci-backend.yml
  push:
    branches:
      - main
    paths:
      - backend/**
      - requirements*.txt
      - .github/workflows/ci-backend.yml

jobs:
  check:
    name: Syntax + Docker build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Python syntax check
        run: python -m compileall backend

      - name: Docker build
        run: docker build -t emwaver-backend-ci ./backend
