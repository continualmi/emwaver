name: Deploy Frontend (Azure Container Apps)

on:
  workflow_dispatch:
  push:
    branches: [ main ]
    paths:
      - frontend/**
      - .github/workflows/deploy-azure-frontend.yml

permissions:
  id-token: write
  contents: read

concurrency:
  group: deploy-frontend
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Azure Login (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Deploy to Azure Container Apps
        uses: azure/container-apps-deploy-action@v2
        with:
          resourceGroup: ${{ secrets.AZURE_RESOURCE_GROUP }}
          containerAppName: ${{ secrets.AZURE_FRONTEND_APP_NAME }}
          registryUrl: ${{ secrets.AZURE_ACR_LOGIN_SERVER }}
          registryUsername: ${{ secrets.AZURE_ACR_USERNAME }}
          registryPassword: ${{ secrets.AZURE_ACR_PASSWORD }}
          imageToBuild: ${{ secrets.AZURE_ACR_LOGIN_SERVER }}/${{ secrets.AZURE_FRONTEND_IMAGE_NAME }}:${{ github.sha }}
          dockerfilePath: frontend/Dockerfile
          buildContextPath: .
          buildArguments: |
            NEXT_PUBLIC_EMWAVER_BACKEND_URL=${{ secrets.NEXT_PUBLIC_EMWAVER_BACKEND_URL }}
            NEXT_PUBLIC_FIREBASE_API_KEY=${{ secrets.NEXT_PUBLIC_FIREBASE_API_KEY }}
            NEXT_PUBLIC_FIREBASE_AUTH_DOMAIN=${{ secrets.NEXT_PUBLIC_FIREBASE_AUTH_DOMAIN }}
            NEXT_PUBLIC_FIREBASE_PROJECT_ID=${{ secrets.NEXT_PUBLIC_FIREBASE_PROJECT_ID }}
            NEXT_PUBLIC_FIREBASE_APP_ID=${{ secrets.NEXT_PUBLIC_FIREBASE_APP_ID }}
