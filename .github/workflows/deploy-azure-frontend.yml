name: Deploy Frontend (Azure Container Apps)

on:
  workflow_dispatch:
  push:
    branches: [ main ]
    paths:
      - frontend/**
      - .github/workflows/deploy-azure-frontend.yml

permissions:
  id-token: write
  contents: read

concurrency:
  group: deploy-frontend
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Azure Login (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Build & push image to ACR (az acr build)
        run: |
          az acr build \
            --registry "${{ secrets.AZURE_ACR_NAME }}" \
            --image "${{ secrets.AZURE_FRONTEND_IMAGE_NAME }}:${{ github.sha }}" \
            --file frontend/Dockerfile \
            --build-arg NEXT_PUBLIC_EMWAVER_BACKEND_URL='${{ secrets.NEXT_PUBLIC_EMWAVER_BACKEND_URL }}' \
            --build-arg NEXT_PUBLIC_FIREBASE_API_KEY='${{ secrets.NEXT_PUBLIC_FIREBASE_API_KEY }}' \
            --build-arg NEXT_PUBLIC_FIREBASE_AUTH_DOMAIN='${{ secrets.NEXT_PUBLIC_FIREBASE_AUTH_DOMAIN }}' \
            --build-arg NEXT_PUBLIC_FIREBASE_PROJECT_ID='${{ secrets.NEXT_PUBLIC_FIREBASE_PROJECT_ID }}' \
            --build-arg NEXT_PUBLIC_FIREBASE_APP_ID='${{ secrets.NEXT_PUBLIC_FIREBASE_APP_ID }}' \
            .

      - name: Deploy revision (az containerapp update)
        run: |
          IMAGE="${{ secrets.AZURE_ACR_LOGIN_SERVER }}/${{ secrets.AZURE_FRONTEND_IMAGE_NAME }}:${{ github.sha }}"
          az containerapp update \
            --name "${{ secrets.AZURE_FRONTEND_APP_NAME }}" \
            --resource-group "${{ secrets.AZURE_RESOURCE_GROUP }}" \
            --image "$IMAGE"
