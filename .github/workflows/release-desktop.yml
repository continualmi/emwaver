name: Release Desktop App

on:
  push:
    tags:
      - 'app-v*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Version tag (e.g., v0.1.0)'
        required: true

jobs:
  build:
    name: Build Desktop for ${{ matrix.platform }}
    runs-on: ${{ matrix.os }}
    timeout-minutes: 60
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            platform: linux
          - os: windows-latest
            platform: windows
          # Build both Intel and Apple Silicon bundles so users can download the right DMG.
          # `macos-15-intel` is the current Intel runner label; `macos-latest` targets Apple Silicon (ARM64).
          - os: macos-15-intel
            platform: macos-x64
          - os: macos-latest
            platform: macos-arm64

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: app/package-lock.json

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Rust cache
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: |
            app/src-tauri -> target

      - name: Install Linux dependencies
        if: matrix.platform == 'linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libgtk-3-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            patchelf \
            pkg-config \
            libdbus-1-dev \
            libbluetooth-dev \
            libudev-dev \
            rpm \
            squashfs-tools
          # Some runners ship `libfuse2` under a different package name.
          sudo apt-get install -y libfuse2 || sudo apt-get install -y libfuse2t64

      - name: Install npm deps
        run: |
          cd app
          npm ci

      - name: Setup macOS signing keychain
        if: startsWith(matrix.platform, 'macos-')
        shell: bash
        env:
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
        run: |
          set -euo pipefail

          if [ -z "${APPLE_CERTIFICATE:-}" ]; then
            echo "APPLE_CERTIFICATE secret not set; skipping macOS signing setup."
            exit 0
          fi

          CERT_P12_PATH="$RUNNER_TEMP/apple_cert.p12"
          KEYCHAIN_PATH="$RUNNER_TEMP/build.keychain-db"
          KEYCHAIN_PASSWORD="$(uuidgen)"

          if base64 --help 2>&1 | grep -q -- '--decode'; then
            echo "$APPLE_CERTIFICATE" | base64 --decode > "$CERT_P12_PATH"
          else
            echo "$APPLE_CERTIFICATE" | base64 -D > "$CERT_P12_PATH"
          fi

          security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"

          security import "$CERT_P12_PATH" -k "$KEYCHAIN_PATH" -P "$APPLE_CERTIFICATE_PASSWORD" -A -t cert -f pkcs12
          security list-keychain -d user -s "$KEYCHAIN_PATH"
          security default-keychain -d user -s "$KEYCHAIN_PATH"
          security set-key-partition-list -S apple-tool:,apple: -s -k "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"

      - name: Build bundles
        shell: bash
        run: |
          cd app
          # Be explicit about the Rust target so the produced macOS bundles match the intended architecture.
          TARGET_ARGS=()
          if [[ "${{ matrix.platform }}" == "macos-x64" ]]; then
            TARGET_ARGS+=(--target x86_64-apple-darwin)
          elif [[ "${{ matrix.platform }}" == "macos-arm64" ]]; then
            TARGET_ARGS+=(--target aarch64-apple-darwin)
          fi

          npm run tauri build -- --ci "${TARGET_ARGS[@]}"

      - name: Verify macOS bundle (arch + minimum OS)
        if: startsWith(matrix.platform, 'macos-')
        shell: bash
        run: |
          set -euo pipefail
          BUNDLE_MACOS_DIR="$(find app/src-tauri/target -type d -path '*/release/bundle/macos' -print | head -n 1)"
          if [ -z "${BUNDLE_MACOS_DIR:-}" ] || [ ! -d "$BUNDLE_MACOS_DIR" ]; then
            echo "macOS bundle directory not found under app/src-tauri/target"
            find app/src-tauri/target -maxdepth 5 -type d -name bundle -print || true
            exit 1
          fi

          APP_PATH="$(find "$BUNDLE_MACOS_DIR" -maxdepth 1 -name "*.app" -print | head -n 1)"
          if [ -z "${APP_PATH:-}" ]; then
            echo "No .app found under $BUNDLE_MACOS_DIR"
            find "$BUNDLE_MACOS_DIR" -maxdepth 2 -type f -print || true
            exit 1
          fi

          echo "App bundle: $APP_PATH"
          INFO_PLIST="$APP_PATH/Contents/Info.plist"
          if [ -f "$INFO_PLIST" ]; then
            echo "LSMinimumSystemVersion:"
            /usr/libexec/PlistBuddy -c 'Print :LSMinimumSystemVersion' "$INFO_PLIST" 2>/dev/null || true
          fi

          BIN_PATH="$(find "$APP_PATH/Contents/MacOS" -maxdepth 1 -type f -print | head -n 1)"
          if [ -z "${BIN_PATH:-}" ]; then
            echo "No executable found under $APP_PATH/Contents/MacOS"
            exit 1
          fi

          echo "Binary: $BIN_PATH"
          file "$BIN_PATH"
          if command -v lipo >/dev/null 2>&1; then
            lipo -info "$BIN_PATH" || true
          fi

      - name: Sign + notarize macOS DMG
        if: startsWith(matrix.platform, 'macos-')
        shell: bash
        env:
          APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
          APPLE_API_ISSUER: ${{ secrets.APPLE_API_ISSUER }}
          APPLE_API_KEY_ID: ${{ secrets.APPLE_API_KEY_ID }}
          APPLE_API_KEY: ${{ secrets.APPLE_API_KEY }}
        run: |
          set -euo pipefail

          if [ -z "${APPLE_SIGNING_IDENTITY:-}" ] || [ -z "${APPLE_API_KEY:-}" ] || [ -z "${APPLE_API_KEY_ID:-}" ] || [ -z "${APPLE_API_ISSUER:-}" ]; then
            echo "Notarization secrets not set; skipping macOS signing + notarization."
            exit 0
          fi

          BUNDLE_MACOS_DIR="$(find app/src-tauri/target -type d -path '*/release/bundle/macos' -print | head -n 1)"
          if [ -z "${BUNDLE_MACOS_DIR:-}" ] || [ ! -d "$BUNDLE_MACOS_DIR" ]; then
            echo "macOS bundle directory not found under app/src-tauri/target"
            find app/src-tauri/target -maxdepth 5 -type d -name bundle -print || true
            exit 1
          fi
          APP_PATH="$(find "$BUNDLE_MACOS_DIR" -maxdepth 1 -name "*.app" -print | head -n 1)"
          if [ -z "${APP_PATH:-}" ]; then
            echo "No .app found under $BUNDLE_MACOS_DIR"
            exit 1
          fi

          echo "Signing app: $APP_PATH"
          codesign --force --options runtime --timestamp --deep --sign "$APPLE_SIGNING_IDENTITY" "$APP_PATH"
          codesign --verify --deep --strict --verbose=4 "$APP_PATH"

          DMG_PATH="$BUNDLE_MACOS_DIR/EMWaver-${{ matrix.platform }}.dmg"
          echo "Creating DMG: $DMG_PATH"
          rm -f "$DMG_PATH"
          hdiutil create -volname "EMWaver" -srcfolder "$APP_PATH" -ov -format UDZO "$DMG_PATH"

          echo "Signing DMG: $DMG_PATH"
          codesign --force --timestamp --sign "$APPLE_SIGNING_IDENTITY" "$DMG_PATH"
          codesign --verify --verbose=4 "$DMG_PATH"

          API_KEY_PATH="$RUNNER_TEMP/AuthKey.p8"
          if base64 --help 2>&1 | grep -q -- '--decode'; then
            echo "$APPLE_API_KEY" | base64 --decode > "$API_KEY_PATH"
          else
            echo "$APPLE_API_KEY" | base64 -D > "$API_KEY_PATH"
          fi

          echo "Submitting for notarization..."
          xcrun notarytool submit "$DMG_PATH" \
            --key "$API_KEY_PATH" \
            --key-id "$APPLE_API_KEY_ID" \
            --issuer "$APPLE_API_ISSUER" \
            --wait

          echo "Stapling notarization ticket..."
          xcrun stapler staple "$DMG_PATH"

      - name: Collect artifacts
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p artifacts
          BUNDLE_DIR="$(find app/src-tauri/target -type d -path '*/release/bundle' -print | head -n 1)"

          if [ -z "${BUNDLE_DIR:-}" ] || [ ! -d "$BUNDLE_DIR" ]; then
            echo "Bundle directory not found under app/src-tauri/target"
            find app/src-tauri/target -maxdepth 5 -type d -name bundle -print || true
            exit 1
          fi

          # Grab common installer formats across platforms.
          # Note: file names vary by platform and bundler target, so match by extension.
          found=0
          while IFS= read -r -d '' f; do
            found=1
            base="$(basename "$f")"
            cp "$f" "artifacts/emwaver-${{ matrix.platform }}-${base}"
          done < <(find "$BUNDLE_DIR" -type f \( \
              -name "*.dmg" -o \
              -name "*.app.tar.gz" -o \
              -name "*.msi" -o \
              -name "*.exe" -o \
              -name "*.deb" -o \
              -name "*.rpm" -o \
              -name "*.AppImage" \
            \) -print0)

          if [ "$found" -eq 0 ]; then
            echo "No bundle artifacts found under $BUNDLE_DIR"
            find "$BUNDLE_DIR" -maxdepth 3 -type f -print || true
            exit 1
          fi

          ls -la artifacts

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: emwaver-desktop-${{ matrix.platform }}
          path: artifacts/*
          retention-days: 30

  release:
    name: Create Release
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Determine version
        id: version
        shell: bash
        run: |
          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            VERSION="${{ github.event.inputs.version }}"
            TAG="app-${VERSION}"
          else
            TAG="${GITHUB_REF#refs/tags/}"
            VERSION="${TAG#app-}"
          fi
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "tag=$TAG" >> $GITHUB_OUTPUT
          echo "Version: $VERSION"
          echo "Tag: $TAG"

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Create checksums
        shell: bash
        run: |
          cd artifacts
          find . -type f ! -name "*.sha256" -print0 | while IFS= read -r -d '' file; do
            sha256sum "$file" > "${file}.sha256"
          done

      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          name: EMWaver Desktop ${{ steps.version.outputs.version }}
          body: |
            ## EMWaver Desktop ${{ steps.version.outputs.version }}

            Downloads for macOS, Windows, and Linux are attached below.

            ### Notes
            - macOS builds are unsigned unless explicitly configured for signing/notarization.
            - Only use EMWaver on devices and systems you own or have permission to test.
          files: artifacts/**/*
          fail_on_unmatched_files: false
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
