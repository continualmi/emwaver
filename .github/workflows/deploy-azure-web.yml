name: Deploy Web (Azure Container Apps)

on:
  workflow_dispatch:
  push:
    branches: [ prod ]
    paths:
      - web/**
      - .dockerignore
      - .github/workflows/deploy-azure-web.yml

permissions:
  contents: read
  id-token: write

concurrency:
  group: azure-web-containerapp
  cancel-in-progress: true

env:
  AZURE_CONTAINERAPP_NAME: emwaver-web
  AZURE_CONTAINERAPPS_ENVIRONMENT: managedEnvironment-emwaver-9c25
  AZURE_RESOURCE_GROUP: emwaver
  IMAGE_NAME: emwaver-web

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Resolve continual-core ref
        id: core_ref
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          REPO_URL="https://x-access-token:${GITHUB_TOKEN}@github.com/continualmi/continual-core.git"
          CANDIDATE_REF="${GITHUB_REF_NAME}"
          if git ls-remote --exit-code --heads "${REPO_URL}" "${CANDIDATE_REF}" >/dev/null 2>&1; then
            echo "ref=${CANDIDATE_REF}" >> "$GITHUB_OUTPUT"
          else
            echo "ref=main" >> "$GITHUB_OUTPUT"
          fi

      - name: Check out continual-core
        uses: actions/checkout@v4
        with:
          repository: continualmi/continual-core
          ref: ${{ steps.core_ref.outputs.ref }}
          path: continual-core

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Azure
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Log in to Azure Container Registry
        run: az acr login --name "${{ secrets.AZURE_ACR_NAME }}"

      - name: Compute image tags
        id: meta
        run: |
          BRANCH_TAG=$(echo "${GITHUB_REF_NAME}" | tr '[:upper:]' '[:lower:]' | tr '/' '-')
          echo "branch_tag=${BRANCH_TAG}" >> "$GITHUB_OUTPUT"
          echo "sha_tag=sha-${GITHUB_SHA}" >> "$GITHUB_OUTPUT"
          echo "image=${{ secrets.AZURE_ACR_LOGIN_SERVER }}/${IMAGE_NAME}" >> "$GITHUB_OUTPUT"

      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./web/Dockerfile
          push: true
          build-args: |
            NEXT_PUBLIC_EMWAVER_BACKEND_URL=${{ secrets.NEXT_PUBLIC_EMWAVER_BACKEND_URL }}
            NEXT_PUBLIC_FIREBASE_API_KEY=${{ secrets.NEXT_PUBLIC_FIREBASE_API_KEY }}
            NEXT_PUBLIC_FIREBASE_AUTH_DOMAIN=${{ secrets.NEXT_PUBLIC_FIREBASE_AUTH_DOMAIN }}
            NEXT_PUBLIC_FIREBASE_PROJECT_ID=${{ secrets.NEXT_PUBLIC_FIREBASE_PROJECT_ID }}
            NEXT_PUBLIC_FIREBASE_APP_ID=${{ secrets.NEXT_PUBLIC_FIREBASE_APP_ID }}
          tags: |
            ${{ steps.meta.outputs.image }}:${{ steps.meta.outputs.sha_tag }}
            ${{ steps.meta.outputs.image }}:${{ steps.meta.outputs.branch_tag }}

      - name: Read ACR credentials
        id: acr
        run: |
          echo "username=$(az acr credential show -n '${{ secrets.AZURE_ACR_NAME }}' --query 'username' -o tsv)" >> "$GITHUB_OUTPUT"
          echo "password=$(az acr credential show -n '${{ secrets.AZURE_ACR_NAME }}' --query 'passwords[0].value' -o tsv)" >> "$GITHUB_OUTPUT"

      - name: Create or update Azure Container App
        shell: bash
        run: |
          set -euo pipefail

          IMAGE="${{ steps.meta.outputs.image }}:${{ steps.meta.outputs.sha_tag }}"

          if az containerapp show \
            --resource-group "${AZURE_RESOURCE_GROUP}" \
            --name "${AZURE_CONTAINERAPP_NAME}" >/dev/null 2>&1; then
            az containerapp update \
              --resource-group "${AZURE_RESOURCE_GROUP}" \
              --name "${AZURE_CONTAINERAPP_NAME}" \
              --image "${IMAGE}" \
              --min-replicas 0 \
              --max-replicas 1
          else
            az containerapp create \
              --resource-group "${AZURE_RESOURCE_GROUP}" \
              --environment "${AZURE_CONTAINERAPPS_ENVIRONMENT}" \
              --name "${AZURE_CONTAINERAPP_NAME}" \
              --image "${IMAGE}" \
              --target-port 3000 \
              --ingress external \
              --registry-server "${{ secrets.AZURE_ACR_LOGIN_SERVER }}" \
              --registry-username "${{ steps.acr.outputs.username }}" \
              --registry-password "${{ steps.acr.outputs.password }}" \
              --cpu 0.5 \
              --memory 1.0Gi \
              --min-replicas 0 \
              --max-replicas 1
          fi

      - name: Configure runtime settings
        shell: bash
        run: |
          set -euo pipefail

          az containerapp update \
            --resource-group "${AZURE_RESOURCE_GROUP}" \
            --name "${AZURE_CONTAINERAPP_NAME}" \
            --set-env-vars \
              NODE_ENV=production \
              PORT=3000
