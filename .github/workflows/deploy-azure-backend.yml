name: Deploy Backend (Azure Container Apps)

on:
  workflow_dispatch:
  push:
    branches: [ main ]
    paths:
      - backend/**
      - requirements*.txt
      - .github/workflows/deploy-azure-backend.yml

permissions:
  id-token: write
  contents: read

concurrency:
  group: deploy-backend
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Azure Login (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Build & push image to ACR (az acr build)
        run: |
          az acr build \
            --registry "${{ secrets.AZURE_ACR_NAME }}" \
            --image "${{ secrets.AZURE_BACKEND_IMAGE_NAME }}:${{ github.sha }}" \
            --file backend/Dockerfile \
            .

      - name: Deploy revision (az containerapp update)
        run: |
          IMAGE="${{ secrets.AZURE_ACR_LOGIN_SERVER }}/${{ secrets.AZURE_BACKEND_IMAGE_NAME }}:${{ github.sha }}"
          az containerapp update \
            --name "${{ secrets.AZURE_BACKEND_APP_NAME }}" \
            --resource-group "${{ secrets.AZURE_RESOURCE_GROUP }}" \
            --image "$IMAGE" \
            --set-env-vars \
              EMWAVER_ALLOW_ANON_SYNC='${{ secrets.EMWAVER_ALLOW_ANON_SYNC }}' \
              DATABASE_URL='${{ secrets.DATABASE_URL }}' \
              AZURE_STORAGE_CONNECTION_STRING='${{ secrets.AZURE_STORAGE_CONNECTION_STRING }}' \
              AZURE_STORAGE_CONTAINER='${{ secrets.AZURE_STORAGE_CONTAINER }}' \
              FIREBASE_PROJECT_ID='${{ secrets.FIREBASE_PROJECT_ID }}' \
              FIREBASE_ADMIN_JSON_B64='${{ secrets.FIREBASE_ADMIN_JSON_B64 }}' \
              FIREBASE_SERVICE_ACCOUNT_JSON='${{ secrets.FIREBASE_SERVICE_ACCOUNT_JSON }}'
