name: Daemon CI

on:
  pull_request:
    paths:
      - "daemon/**"
      - "gateway/**"
      - "assets/default-scripts/**"
      - "simulator/**"
      - "scripts/check-rust-toolchain.sh"
      - "scripts/rebirth-gateway-daemon-sim-validation.sh"
      - "scripts/rebirth-install-smoke.sh"
      - ".github/workflows/daemon-ci.yml"
  push:
    branches:
      - main
    paths:
      - "daemon/**"
      - "gateway/**"
      - "assets/default-scripts/**"
      - "simulator/**"
      - "scripts/check-rust-toolchain.sh"
      - "scripts/rebirth-gateway-daemon-sim-validation.sh"
      - "scripts/rebirth-install-smoke.sh"
      - ".github/workflows/daemon-ci.yml"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  verify:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Install Linux MIDI build dependencies
        run: sudo apt-get update && sudo apt-get install -y libasound2-dev

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"
          cache-dependency-path: gateway/package-lock.json

      - name: Cache Cargo
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: daemon

      - name: Rust preflight
        run: scripts/check-rust-toolchain.sh

      - name: Test extracted runtime and device crates
        working-directory: daemon
        run: cargo test -p emwaver-runtime -p emwaver-device

      - name: Build host and CLI
        working-directory: daemon
        run: cargo build -p emwaver

      - name: Smoke test direct UI-only script run
        working-directory: daemon
        run: |
          set -euo pipefail
          tmp="$(mktemp /tmp/emwaver-ci.XXXXXX)"
          trap 'rm -f "$tmp"' EXIT
          printf 'UI.render(UI.text({ text: "ci" }));\n' > "$tmp"
          cargo run -q -p emwaver -- run "$tmp" --direct --no-device

      - name: Smoke test simulator-backed script run
        working-directory: daemon
        run: |
          set -euo pipefail
          tmp="$(mktemp /tmp/emwaver-sim-ci.XXXXXX)"
          trap 'rm -f "$tmp"' EXIT
          {
            printf 'pinMode(13, OUTPUT);\n'
            printf 'digitalWrite(13, HIGH);\n'
            printf 'var board = device.boardType({ refresh: true });\n'
            printf 'var value = analogRead(0);\n'
            printf 'UI.render(UI.column({ children: [UI.text({ text: board }), UI.text({ text: String(value) })] }));\n'
          } > "$tmp"
          cargo run -q -p emwaver -- run "$tmp" --direct --sim-device

      - name: Smoke test systemd user unit generation
        working-directory: daemon
        run: |
          set -euo pipefail
          cargo run -q -p emwaver -- service print-unit --ble --port 3921 > /tmp/emwaver-daemon.service
          grep -F "ExecStart=" /tmp/emwaver-daemon.service
          grep -F "daemon serve" /tmp/emwaver-daemon.service
          grep -F -- "--ble" /tmp/emwaver-daemon.service
          grep -F "WantedBy=default.target" /tmp/emwaver-daemon.service

      - name: Smoke test gateway to daemon simulator
        run: |
          cd gateway
          npm ci
          cd ..
          scripts/rebirth-gateway-daemon-sim-validation.sh

      - name: Smoke test CLI gateway daemon fallback
        env:
          EMWAVER_GATEWAY_PORT: "3923"
          EMWAVER_GATEWAY_DAEMON_SIM_MODE: fallback
        run: scripts/rebirth-gateway-daemon-sim-validation.sh

      - name: Smoke test development install package
        run: scripts/rebirth-install-smoke.sh
