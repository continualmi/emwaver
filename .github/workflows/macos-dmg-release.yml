name: macOS DMG Release

on:
  workflow_dispatch:
    inputs:
      tag:
        description: "Existing GitHub Release tag to update; blank uses VERSION"
        required: false
        default: ""

permissions:
  contents: write

jobs:
  build:
    runs-on: macos-15
    env:
      SPARKLE_PUBLIC_ED_KEY: ${{ secrets.SPARKLE_PUBLIC_ED_KEY }}
      SPARKLE_PRIVATE_ED_KEY: ${{ secrets.SPARKLE_PRIVATE_ED_KEY }}

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Resolve release tag and version
        env:
          INPUT_TAG: ${{ inputs.tag }}
          REF_NAME: ${{ github.ref_name }}
          REF_TYPE: ${{ github.ref_type }}
        run: |
          set -euo pipefail
          release_tag="${INPUT_TAG}"
          if [ -z "${release_tag}" ] && [ "${REF_TYPE}" = "tag" ]; then
            release_tag="${REF_NAME}"
          fi
          if [ -z "${release_tag}" ]; then
            release_tag="$(tr -d '[:space:]' < VERSION)"
          fi

          version=""
          if [[ "${release_tag}" =~ ^[0-9]+[.][0-9]+[.][0-9]+([.-].*)?$ ]]; then
            version="${release_tag}"
          fi
          if [ -z "${version}" ]; then
            version="$(tr -d '[:space:]' < VERSION)"
          fi
          echo "EMWAVER_RELEASE_TAG=${release_tag}" >> "${GITHUB_ENV}"
          echo "EMWAVER_RELEASE_VERSION=${version}" >> "${GITHUB_ENV}"
          echo "Resolved release tag: ${release_tag}"
          echo "Resolved macOS version: ${version}"

      - name: Select Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: latest-stable

      - name: Build macOS app
        working-directory: macos/EMWaver
        run: |
          set -euo pipefail
          xcodebuild \
            -project EMWaver.xcodeproj \
            -scheme EMWaver \
            -configuration Release \
            -derivedDataPath build \
            CODE_SIGNING_ALLOWED=NO \
            MARKETING_VERSION="${EMWAVER_RELEASE_VERSION}" \
            SPARKLE_PUBLIC_ED_KEY="${SPARKLE_PUBLIC_ED_KEY}" \
            build

      - name: Create DMG
        run: |
          set -euo pipefail
          mkdir -p dist dmg-root
          cp -R macos/EMWaver/build/Build/Products/Release/EMWaver.app dmg-root/
          hdiutil create \
            -volname "EMWaver" \
            -srcfolder dmg-root \
            -ov \
            -format UDZO \
            dist/EMWaver-macos.dmg

      - name: Generate Sparkle appcast
        run: |
          set -euo pipefail
          if [ -z "${SPARKLE_PRIVATE_ED_KEY}" ]; then
            echo "Set SPARKLE_PRIVATE_ED_KEY to generate the signed Sparkle appcast."
            exit 1
          fi
          sparkle_bin="macos/EMWaver/build/SourcePackages/artifacts/sparkle/Sparkle/bin"
          test -x "${sparkle_bin}/generate_appcast" || (echo "Missing Sparkle generate_appcast tool at ${sparkle_bin}" >&2; exit 1)

          mkdir -p dist/sparkle
          cp dist/EMWaver-macos.dmg dist/sparkle/
          printf '%s' "${SPARKLE_PRIVATE_ED_KEY}" | \
            "${sparkle_bin}/generate_appcast" \
              --ed-key-file - \
              --download-url-prefix "https://github.com/continualmi/emwaver/releases/download/${EMWAVER_RELEASE_TAG}/" \
              -o appcast.xml \
              dist/sparkle
          cp dist/sparkle/appcast.xml dist/appcast.xml

      - name: Verify target GitHub Release exists
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh release view "${EMWAVER_RELEASE_TAG}" --json tagName,url

      - name: Upload workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: EMWaver-macos-dmg
          path: |
            dist/EMWaver-macos.dmg
            dist/appcast.xml

      - name: Publish release asset
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ env.EMWAVER_RELEASE_TAG }}
          prerelease: false
          make_latest: true
          overwrite_files: true
          fail_on_unmatched_files: true
          files: |
            dist/EMWaver-macos.dmg
            dist/appcast.xml
