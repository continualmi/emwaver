name: macOS DMG Release

# Builds the direct-download macOS DMG, then signs, notarizes, and appcasts it.
on:
  workflow_dispatch:
    inputs:
      tag:
        description: "Existing GitHub Release tag to update; blank uses VERSION"
        required: false
        default: ""
  repository_dispatch:
    types:
      - macos-dmg-release
  push:
    branches:
      - main
    paths:
      - ".github/workflows/macos-dmg-release.yml"

permissions:
  contents: write

jobs:
  build:
    runs-on: macos-15
    environment: app-store
    env:
      APP_STORE_CONNECT_API_KEY_ID: ${{ secrets.APP_STORE_CONNECT_API_KEY_ID }}
      APP_STORE_CONNECT_API_ISSUER_ID: ${{ secrets.APP_STORE_CONNECT_API_ISSUER_ID }}
      SPARKLE_PUBLIC_ED_KEY: ${{ secrets.SPARKLE_PUBLIC_ED_KEY }}
      SPARKLE_PRIVATE_ED_KEY: ${{ secrets.SPARKLE_PRIVATE_ED_KEY }}
      MACOS_DEVELOPER_ID_CERTIFICATE_BASE64: ${{ secrets.MACOS_DEVELOPER_ID_CERTIFICATE_BASE64 }}
      MACOS_DEVELOPER_ID_CERTIFICATE_PASSWORD: ${{ secrets.MACOS_DEVELOPER_ID_CERTIFICATE_PASSWORD }}
      MACOS_DEVELOPER_ID_APPLICATION_IDENTITY: ${{ secrets.MACOS_DEVELOPER_ID_APPLICATION_IDENTITY }}
      MACOS_KEYCHAIN_PASSWORD: ${{ secrets.MACOS_KEYCHAIN_PASSWORD }}

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Resolve release tag and version
        env:
          WORKFLOW_INPUT_TAG: ${{ github.event.inputs.tag }}
          REPOSITORY_DISPATCH_TAG: ${{ github.event.client_payload.tag }}
          REF_NAME: ${{ github.ref_name }}
          REF_TYPE: ${{ github.ref_type }}
        run: |
          set -euo pipefail
          release_tag="${WORKFLOW_INPUT_TAG:-${REPOSITORY_DISPATCH_TAG:-}}"
          if [ -z "${release_tag}" ] && [ "${REF_TYPE}" = "tag" ]; then
            release_tag="${REF_NAME}"
          fi
          if [ -z "${release_tag}" ]; then
            release_tag="$(tr -d '[:space:]' < VERSION)"
          fi

          version=""
          if [[ "${release_tag}" =~ ^[0-9]+[.][0-9]+[.][0-9]+([.-].*)?$ ]]; then
            version="${release_tag}"
          fi
          if [ -z "${version}" ]; then
            version="$(tr -d '[:space:]' < VERSION)"
          fi
          echo "EMWAVER_RELEASE_TAG=${release_tag}" >> "${GITHUB_ENV}"
          echo "EMWAVER_RELEASE_VERSION=${version}" >> "${GITHUB_ENV}"
          echo "Resolved release tag: ${release_tag}"
          echo "Resolved macOS version: ${version}"

      - name: Select Xcode
        run: sudo xcode-select -s /Applications/Xcode.app

      - name: Install App Store Connect API key
        env:
          APP_STORE_CONNECT_API_KEY_BASE64: ${{ secrets.APP_STORE_CONNECT_API_KEY_BASE64 }}
        run: |
          set -euo pipefail
          if [ -z "${APP_STORE_CONNECT_API_KEY_ID}" ] || [ -z "${APP_STORE_CONNECT_API_ISSUER_ID}" ] || [ -z "${APP_STORE_CONNECT_API_KEY_BASE64}" ]; then
            echo "Set APP_STORE_CONNECT_API_KEY_ID, APP_STORE_CONNECT_API_ISSUER_ID, and APP_STORE_CONNECT_API_KEY_BASE64 for notarization."
            exit 1
          fi

          mkdir -p private_keys
          echo "${APP_STORE_CONNECT_API_KEY_BASE64}" | base64 -D > "private_keys/AuthKey_${APP_STORE_CONNECT_API_KEY_ID}.p8"
          chmod 600 "private_keys/AuthKey_${APP_STORE_CONNECT_API_KEY_ID}.p8"
          echo "EMWAVER_APP_STORE_CONNECT_API_KEY_PATH=${PWD}/private_keys/AuthKey_${APP_STORE_CONNECT_API_KEY_ID}.p8" >> "${GITHUB_ENV}"

      - name: Install Developer ID Application certificate
        run: |
          set -euo pipefail
          if [ -z "${MACOS_DEVELOPER_ID_CERTIFICATE_BASE64}" ] || [ -z "${MACOS_DEVELOPER_ID_CERTIFICATE_PASSWORD}" ] || [ -z "${MACOS_KEYCHAIN_PASSWORD}" ]; then
            echo "Set MACOS_DEVELOPER_ID_CERTIFICATE_BASE64, MACOS_DEVELOPER_ID_CERTIFICATE_PASSWORD, and MACOS_KEYCHAIN_PASSWORD."
            exit 1
          fi

          security create-keychain -p "${MACOS_KEYCHAIN_PASSWORD}" build.keychain
          security default-keychain -s build.keychain
          security unlock-keychain -p "${MACOS_KEYCHAIN_PASSWORD}" build.keychain
          security set-keychain-settings -lut 21600 build.keychain

          echo "${MACOS_DEVELOPER_ID_CERTIFICATE_BASE64}" | base64 -D > developer-id-application.p12
          security import developer-id-application.p12 \
            -k build.keychain \
            -P "${MACOS_DEVELOPER_ID_CERTIFICATE_PASSWORD}" \
            -T /usr/bin/codesign \
            -T /usr/bin/security
          security set-key-partition-list -S apple-tool:,apple:,codesign: -s -k "${MACOS_KEYCHAIN_PASSWORD}" build.keychain
          security find-identity -v -p codesigning build.keychain

          identity="${MACOS_DEVELOPER_ID_APPLICATION_IDENTITY:-Developer ID Application}"
          echo "EMWAVER_MACOS_CODE_SIGN_IDENTITY=${identity}" >> "${GITHUB_ENV}"

      - name: Build macOS app
        working-directory: macos/EMWaver
        run: |
          set -euo pipefail
          short_sha="${GITHUB_SHA:0:7}"
          xcodebuild \
            -project EMWaver.xcodeproj \
            -scheme EMWaver \
            -configuration Release \
            -derivedDataPath build \
            CODE_SIGNING_ALLOWED=YES \
            CODE_SIGN_STYLE=Manual \
            CODE_SIGN_IDENTITY="${EMWAVER_MACOS_CODE_SIGN_IDENTITY}" \
            DEVELOPMENT_TEAM=9VA9KTUXXN \
            OTHER_CODE_SIGN_FLAGS="--timestamp" \
            MARKETING_VERSION="${EMWAVER_RELEASE_VERSION}" \
            SPARKLE_PUBLIC_ED_KEY="${SPARKLE_PUBLIC_ED_KEY}" \
            EMWAVER_COMMIT="${short_sha}" \
            build

      - name: Sign and verify macOS app bundle
        run: |
          set -euo pipefail
          app="macos/EMWaver/build/Build/Products/Release/EMWaver.app"
          identity="${EMWAVER_MACOS_CODE_SIGN_IDENTITY}"

          test -d "${app}" || (echo "Missing built app at ${app}" >&2; exit 1)

          sign_macho_file() {
            local file_path="$1"
            if file "${file_path}" | grep -Eq 'Mach-O|current ar archive random library'; then
              codesign --force --timestamp --options runtime --sign "${identity}" "${file_path}"
            fi
          }

          if [ -f "${app}/Contents/Resources/emwaver-dfu-helper" ]; then
            sign_macho_file "${app}/Contents/Resources/emwaver-dfu-helper"
          fi
          if [ -d "${app}/Contents/Resources/emwaver-esp-helper" ]; then
            while IFS= read -r -d '' helper_file; do
              sign_macho_file "${helper_file}"
            done < <(find "${app}/Contents/Resources/emwaver-esp-helper" -type f -print0)
          fi

          codesign --force --timestamp --options runtime --sign "${identity}" "${app}"
          codesign --verify --deep --strict --verbose=2 "${app}"

      - name: Create DMG
        run: |
          set -euo pipefail
          mkdir -p dist dmg-root
          cp -R macos/EMWaver/build/Build/Products/Release/EMWaver.app dmg-root/
          hdiutil create \
            -volname "EMWaver" \
            -srcfolder dmg-root \
            -ov \
            -format UDZO \
            dist/EMWaver-macos.dmg
          codesign --force --timestamp --sign "${EMWAVER_MACOS_CODE_SIGN_IDENTITY}" dist/EMWaver-macos.dmg

      - name: Notarize and staple DMG
        run: |
          set -euo pipefail
          submit_output="$(xcrun notarytool submit dist/EMWaver-macos.dmg \
            --key "${EMWAVER_APP_STORE_CONNECT_API_KEY_PATH}" \
            --key-id "${APP_STORE_CONNECT_API_KEY_ID}" \
            --issuer "${APP_STORE_CONNECT_API_ISSUER_ID}" \
            --wait 2>&1)"
          printf '%s\n' "${submit_output}"
          submission_id="$(printf '%s\n' "${submit_output}" | awk '/^[[:space:]]*id: / { print $2; exit }')"
          if printf '%s\n' "${submit_output}" | grep -q "status: Invalid"; then
            if [ -n "${submission_id}" ]; then
              xcrun notarytool log "${submission_id}" \
                --key "${EMWAVER_APP_STORE_CONNECT_API_KEY_PATH}" \
                --key-id "${APP_STORE_CONNECT_API_KEY_ID}" \
                --issuer "${APP_STORE_CONNECT_API_ISSUER_ID}" || true
            fi
            exit 1
          fi
          xcrun stapler staple dist/EMWaver-macos.dmg
          xcrun stapler validate dist/EMWaver-macos.dmg

      - name: Generate Sparkle appcast
        run: |
          set -euo pipefail
          if [ -z "${SPARKLE_PRIVATE_ED_KEY}" ]; then
            echo "Set SPARKLE_PRIVATE_ED_KEY to generate the signed Sparkle appcast."
            exit 1
          fi
          sparkle_bin="macos/EMWaver/build/SourcePackages/artifacts/sparkle/Sparkle/bin"
          test -x "${sparkle_bin}/generate_appcast" || (echo "Missing Sparkle generate_appcast tool at ${sparkle_bin}" >&2; exit 1)

          mkdir -p dist/sparkle
          cp dist/EMWaver-macos.dmg dist/sparkle/
          printf '%s' "${SPARKLE_PRIVATE_ED_KEY}" | \
            "${sparkle_bin}/generate_appcast" \
              --ed-key-file - \
              --download-url-prefix "https://github.com/continualmi/emwaver/releases/download/${EMWAVER_RELEASE_TAG}/" \
              -o appcast.xml \
              dist/sparkle
          cp dist/sparkle/appcast.xml dist/appcast.xml

      - name: Verify target GitHub Release exists
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh release view "${EMWAVER_RELEASE_TAG}" --json tagName,url

      - name: Upload workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: EMWaver-macos-dmg
          path: |
            dist/EMWaver-macos.dmg
            dist/appcast.xml

      - name: Publish release assets
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          gh release upload "${EMWAVER_RELEASE_TAG}" \
            dist/EMWaver-macos.dmg \
            dist/appcast.xml \
            --clobber
          gh release edit "${EMWAVER_RELEASE_TAG}" --latest --prerelease=false

  publish-update-metadata:
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Download macOS update metadata
        uses: actions/download-artifact@v4
        with:
          name: EMWaver-macos-dmg
          path: dist/macos

      - name: Publish macOS appcast to emwaver.ai
        uses: azure/cli@v2
        env:
          AZURE_EMWAVER_STORAGE_CONNECTION_STRING: ${{ secrets.AZURE_EMWAVER_STORAGE_CONNECTION_STRING }}
          AZURE_STORAGE_CONNECTION_STRING: ${{ secrets.AZURE_STORAGE_CONNECTION_STRING }}
        with:
          inlineScript: |
            set -euo pipefail
            CONNECTION_STRING="${AZURE_EMWAVER_STORAGE_CONNECTION_STRING:-${AZURE_STORAGE_CONNECTION_STRING:-}}"
            if [ -z "${CONNECTION_STRING}" ]; then
              echo "Set AZURE_EMWAVER_STORAGE_CONNECTION_STRING, or keep legacy AZURE_STORAGE_CONNECTION_STRING, to publish Sparkle update metadata."
              exit 1
            fi
            az storage blob upload \
              --connection-string "${CONNECTION_STRING}" \
              --container-name '$web' \
              --name updates/macos/appcast.xml \
              --file dist/macos/appcast.xml \
              --content-type application/xml \
              --content-cache-control "public, max-age=300" \
              --overwrite true \
              --only-show-errors
