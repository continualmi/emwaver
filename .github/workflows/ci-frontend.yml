name: CI Frontend

on:
  pull_request:
    paths:
      - frontend/**
      - .github/workflows/ci-frontend.yml
  push:
    branches:
      - main
    paths:
      - frontend/**
      - .github/workflows/ci-frontend.yml

jobs:
  build:
    name: Lint + Build
    runs-on: ubuntu-latest
    timeout-minutes: 20

    defaults:
      run:
        working-directory: frontend

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install deps
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Build
        run: npm run build
