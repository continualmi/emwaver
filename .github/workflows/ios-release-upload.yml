name: iOS Release Upload

on:
  workflow_dispatch:
    inputs:
      build_number:
        description: "Optional App Store build number"
        required: false
        type: string
      changelog:
        description: "Optional App Store Connect/TestFlight changelog"
        required: false
        type: string
  push:
    tags:
      - "ios-v*"
      - "emwaver-ios-v*"

permissions:
  contents: read

concurrency:
  group: ios-release-upload
  cancel-in-progress: false

jobs:
  upload:
    name: Build and upload iOS release
    runs-on: macos-26
    environment: app-store
    timeout-minutes: 60

    env:
      BUNDLE_PATH: vendor/bundle
      FASTLANE_SKIP_UPDATE_CHECK: "1"
      APP_STORE_CONNECT_API_KEY_ID: ${{ secrets.APP_STORE_CONNECT_API_KEY_ID }}
      APP_STORE_CONNECT_API_ISSUER_ID: ${{ secrets.APP_STORE_CONNECT_API_ISSUER_ID }}
      IOS_PROVISIONING_PROFILE_NAME: ${{ secrets.IOS_PROVISIONING_PROFILE_NAME }}
      EMWAVER_IOS_BUILD_NUMBER: ${{ inputs.build_number }}
      EMWAVER_IOS_CHANGELOG: ${{ inputs.changelog }}
      EMWAVER_IOS_EXPORT_OPTIONS: ci-exportOptions.plist
      EMWAVER_IOS_XCARGS: >-
        DEVELOPMENT_TEAM=9VA9KTUXXN

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Select Xcode
        run: sudo xcode-select -s /Applications/Xcode.app

      - name: Install fastlane bundle
        working-directory: ios
        run: bundle install

      - name: Install App Store Connect API key
        working-directory: ios
        env:
          APP_STORE_CONNECT_API_KEY_BASE64: ${{ secrets.APP_STORE_CONNECT_API_KEY_BASE64 }}
        run: |
          set -euo pipefail
          mkdir -p private_keys
          echo "${APP_STORE_CONNECT_API_KEY_BASE64}" | base64 -D > "private_keys/AuthKey_${APP_STORE_CONNECT_API_KEY_ID}.p8"
          chmod 600 "private_keys/AuthKey_${APP_STORE_CONNECT_API_KEY_ID}.p8"
          echo "EMWAVER_APP_STORE_CONNECT_API_KEY_PATH=${PWD}/private_keys/AuthKey_${APP_STORE_CONNECT_API_KEY_ID}.p8" >> "${GITHUB_ENV}"

      - name: Install signing certificate and provisioning profile
        working-directory: ios
        env:
          IOS_DISTRIBUTION_CERTIFICATE_BASE64: ${{ secrets.IOS_DISTRIBUTION_CERTIFICATE_BASE64 }}
          IOS_DISTRIBUTION_CERTIFICATE_PASSWORD: ${{ secrets.IOS_DISTRIBUTION_CERTIFICATE_PASSWORD }}
          IOS_PROVISIONING_PROFILE_BASE64: ${{ secrets.IOS_PROVISIONING_PROFILE_BASE64 }}
          KEYCHAIN_PASSWORD: ${{ secrets.IOS_KEYCHAIN_PASSWORD }}
        run: |
          set -euo pipefail
          security create-keychain -p "${KEYCHAIN_PASSWORD}" build.keychain
          security default-keychain -s build.keychain
          security unlock-keychain -p "${KEYCHAIN_PASSWORD}" build.keychain
          security set-keychain-settings -lut 21600 build.keychain

          echo "${IOS_DISTRIBUTION_CERTIFICATE_BASE64}" | base64 -D > distribution.p12
          security import distribution.p12 -k build.keychain -P "${IOS_DISTRIBUTION_CERTIFICATE_PASSWORD}" -T /usr/bin/codesign -T /usr/bin/security
          security set-key-partition-list -S apple-tool:,apple:,codesign: -s -k "${KEYCHAIN_PASSWORD}" build.keychain

          mkdir -p "${HOME}/Library/MobileDevice/Provisioning Profiles"
          echo "${IOS_PROVISIONING_PROFILE_BASE64}" | base64 -D > "${HOME}/Library/MobileDevice/Provisioning Profiles/EMWaver_AppStore.mobileprovision"

      - name: Write CI export options
        working-directory: ios
        run: |
          set -euo pipefail
          cat > ci-exportOptions.plist <<PLIST
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
            <key>destination</key>
            <string>export</string>
            <key>method</key>
            <string>app-store</string>
            <key>provisioningProfiles</key>
            <dict>
              <key>com.emwaver.EMWaver</key>
              <string>${IOS_PROVISIONING_PROFILE_NAME}</string>
            </dict>
            <key>signingStyle</key>
            <string>manual</string>
            <key>stripSwiftSymbols</key>
            <true/>
            <key>teamID</key>
            <string>9VA9KTUXXN</string>
            <key>uploadSymbols</key>
            <true/>
          </dict>
          </plist>
          PLIST
          plutil -lint ci-exportOptions.plist

      - name: Upload to App Store Connect
        working-directory: ios
        run: bundle exec fastlane ios release_upload

      - name: Upload IPA artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: EMWaver-iOS-IPA
          path: build/ios/EMWaver.ipa
          if-no-files-found: ignore
