name: Release CLI

on:
  push:
    tags:
      - 'cli-v*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Version tag (e.g., v0.1.0)'
        required: true

jobs:
  build:
    name: Build CLI for ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    timeout-minutes: 30
    strategy:
      fail-fast: false
      max-parallel: 5
      matrix:
        include:
          # Build on an older Ubuntu to maximize glibc compatibility across distros.
          - os: ubuntu-20.04
            target: x86_64-unknown-linux-gnu
            artifact_name: emwaver-cli-linux-x86_64
          # Future:
          # - Linux aarch64 (cross-compilation + system deps)
          # - macOS (Intel/Apple Silicon)
          # - Windows (MSVC)

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install Linux dependencies
        if: matrix.os == 'ubuntu-20.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y libbluetooth-dev libdbus-1-dev pkg-config

      - name: Build release binary
        run: |
          cd cli
          cargo build --release --target ${{ matrix.target }}

      - name: Strip binary
        run: |
          strip cli/target/${{ matrix.target }}/release/emwaver

      - name: Prepare artifact
        run: |
          cd cli/target/${{ matrix.target }}/release
          mv emwaver ${{ matrix.artifact_name }}

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}
          path: cli/target/${{ matrix.target }}/release/${{ matrix.artifact_name }}
          retention-days: 30

  release:
    name: Create Release
    needs: build
    if: always()
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Determine version
        id: version
        run: |
          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            VERSION="${{ github.event.inputs.version }}"
          else
            VERSION="${GITHUB_REF#refs/tags/cli-}"
          fi
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "Version: $VERSION"

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          continue-on-error: true

      - name: Create checksums
        run: |
          cd artifacts
          # Only process files that exist (skip if no artifacts downloaded)
          if [ -n "$(ls -A 2>/dev/null)" ]; then
            for file in *; do
              if [ -f "$file" ] && [[ "$file" != *.sha256 ]]; then
                sha256sum "$file" > "${file}.sha256"
              fi
            done
          else
            echo "No artifacts found - some builds may have failed"
          fi

      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: cli-${{ steps.version.outputs.version }}
          name: EMWaver CLI ${{ steps.version.outputs.version }}
          body: |
            ## EMWaver CLI ${{ steps.version.outputs.version }}

            ### Installation

            **Linux:**
            ```bash
            curl -fsSL https://raw.githubusercontent.com/luispl77/emwaver/main/cli/install.sh | sh
            ```

            ### Checksums
            See the `.sha256` files for verification.

            ### Changes
            See the [full changelog](https://github.com/luispl77/emwaver/releases).
          files: artifacts/*
          fail_on_unmatched_files: false
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
