name: Release CLI

on:
  push:
    tags:
      - 'cli-v*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Version tag (e.g., v0.1.0)'
        required: true

jobs:
  build:
    name: Build CLI for ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-22.04
            target: x86_64-unknown-linux-gnu
            artifact_name: emwaver-cli-linux-x86_64
          - os: ubuntu-22.04
            target: aarch64-unknown-linux-gnu
            artifact_name: emwaver-cli-linux-aarch64
          - os: macos-13
            target: x86_64-apple-darwin
            artifact_name: emwaver-cli-macos-x86_64
          - os: macos-13
            target: aarch64-apple-darwin
            artifact_name: emwaver-cli-macos-aarch64
          - os: windows-2022
            target: x86_64-pc-windows-msvc
            artifact_name: emwaver-cli-windows-x86_64.exe

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install Linux dependencies
        if: matrix.os == 'ubuntu-22.04' && matrix.target == 'x86_64-unknown-linux-gnu'
        run: |
          sudo apt-get update
          sudo apt-get install -y libbluetooth-dev libdbus-1-dev pkg-config

      - name: Install Linux cross-compilation dependencies
        if: matrix.os == 'ubuntu-22.04' && matrix.target == 'aarch64-unknown-linux-gnu'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            gcc-aarch64-linux-gnu \
            libc6-dev-arm64-cross \
            pkg-config

      - name: Build release binary
        env:
          PKG_CONFIG_ALLOW_CROSS: ${{ matrix.target == 'aarch64-unknown-linux-gnu' && '1' || '' }}
          CC_aarch64_unknown_linux_gnu: ${{ matrix.target == 'aarch64-unknown-linux-gnu' && 'aarch64-linux-gnu-gcc' || '' }}
          CARGO_TARGET_AARCH64_UNKNOWN_LINUX_GNU_LINKER: ${{ matrix.target == 'aarch64-unknown-linux-gnu' && 'aarch64-linux-gnu-gcc' || '' }}
        run: |
          cd cli
          # For ARM64 cross-compilation, we need to disable pkg-config for dbus
          # and let the build script use vendored sources
          if [ "${{ matrix.target }}" == "aarch64-unknown-linux-gnu" ]; then
            export DBUS_1_NO_PKG_CONFIG=1
          fi
          cargo build --release --target ${{ matrix.target }}

      - name: Strip binary (Unix)
        if: matrix.os != 'windows-2022'
        run: |
          if [ "${{ matrix.target }}" == "aarch64-unknown-linux-gnu" ]; then
            aarch64-linux-gnu-strip cli/target/${{ matrix.target }}/release/emwaver
          else
            strip cli/target/${{ matrix.target }}/release/emwaver
          fi

      - name: Prepare artifact (Unix)
        if: matrix.os != 'windows-2022'
        run: |
          cd cli/target/${{ matrix.target }}/release
          if [ "${{ matrix.target }}" == "x86_64-unknown-linux-gnu" ] || [ "${{ matrix.target }}" == "aarch64-unknown-linux-gnu" ]; then
            mv emwaver ${{ matrix.artifact_name }}
          else
            mv emwaver ${{ matrix.artifact_name }}
          fi

      - name: Prepare artifact (Windows)
        if: matrix.os == 'windows-2022'
        run: |
          cd cli/target/${{ matrix.target }}/release
          mv emwaver.exe ${{ matrix.artifact_name }}

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}
          path: cli/target/${{ matrix.target }}/release/${{ matrix.artifact_name }}
          retention-days: 30

  release:
    name: Create Release
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Determine version
        id: version
        run: |
          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            VERSION="${{ github.event.inputs.version }}"
          else
            VERSION="${GITHUB_REF#refs/tags/cli-}"
          fi
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "Version: $VERSION"

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Create checksums
        run: |
          cd artifacts
          for file in *; do
            if [[ "$file" != *.exe ]]; then
              sha256sum "$file" > "${file}.sha256"
            else
              certutil -hashfile "$file" SHA256 | findstr /v "CertUtil" | findstr /v "SHA256" > "${file}.sha256" || true
            fi
          done

      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: cli-${{ steps.version.outputs.version }}
          name: EMWaver CLI ${{ steps.version.outputs.version }}
          body: |
            ## EMWaver CLI ${{ steps.version.outputs.version }}

            ### Installation

            **Linux/macOS:**
            ```bash
            curl -fsSL https://raw.githubusercontent.com/luispl77/emwaver/main/cli/install.sh | sh
            ```

            **Windows:**
            Download `emwaver-cli-windows-x86_64.exe` and add it to your PATH.

            ### Checksums
            See the `.sha256` files for verification.

            ### Changes
            See the [full changelog](https://github.com/luispl77/emwaver/releases).
          files: artifacts/*
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
