name: Android Play Release

on:
  workflow_dispatch:
    inputs:
      version_code:
        description: "Optional Android versionCode"
        required: false
        type: string
      version_name:
        description: "Optional Android versionName"
        required: false
        type: string
      changelog:
        description: "Optional Google Play changelog"
        required: false
        type: string
      track:
        description: "Google Play track"
        required: false
        default: "internal"
        type: string
  push:
    tags:
      - "android-v*"
      - "emwaver-android-v*"

permissions:
  contents: read

concurrency:
  group: android-play-release
  cancel-in-progress: false

jobs:
  play:
    name: Build and upload Android app
    runs-on: ubuntu-latest
    environment: play-store
    timeout-minutes: 45

    env:
      BUNDLE_PATH: vendor/bundle
      FASTLANE_SKIP_UPDATE_CHECK: "1"
      EMWAVER_ANDROID_VERSION_CODE: ${{ inputs.version_code }}
      EMWAVER_ANDROID_VERSION_NAME: ${{ inputs.version_name }}
      EMWAVER_ANDROID_CHANGELOG: ${{ inputs.changelog }}
      GOOGLE_PLAY_TRACK: ${{ inputs.track || 'internal' }}
      GOOGLE_PLAY_RELEASE_STATUS: draft

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Resolve release version
        env:
          INPUT_VERSION_NAME: ${{ inputs.version_name }}
          REF_NAME: ${{ github.ref_name }}
        run: |
          set -euo pipefail
          version="${INPUT_VERSION_NAME}"
          if [ -z "${version}" ] && [[ "${REF_NAME}" == android-v* ]]; then
            version="${REF_NAME#android-v}"
          fi
          if [ -z "${version}" ] && [[ "${REF_NAME}" == emwaver-android-v* ]]; then
            version="${REF_NAME#emwaver-android-v}"
          fi
          if [ -z "${version}" ] && [[ "${REF_NAME}" == emwaver-v* ]]; then
            version="${REF_NAME#emwaver-v}"
          fi
          if [ -z "${version}" ]; then
            version="$(tr -d '[:space:]' < VERSION)"
          fi
          echo "EMWAVER_ANDROID_VERSION_NAME=${version}" >> "${GITHUB_ENV}"
          echo "Resolved Android versionName: ${version}"

      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
          cache: gradle

      - name: Set up Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: "3.1"
          working-directory: android
          bundler-cache: true

      - name: Stage bundled firmware for Android assets
        run: |
          set -euo pipefail
          mkdir -p stm/emwaver-firmware/Release
          cp firmware/emwaver.bin stm/emwaver-firmware/Release/emwaver-firmware.bin

      - name: Install Android release signing key
        working-directory: android
        env:
          ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
        run: |
          set -euo pipefail
          mkdir -p private_keys
          echo "${ANDROID_KEYSTORE_BASE64}" | base64 -d > private_keys/emwaver-upload.jks
          chmod 600 private_keys/emwaver-upload.jks
          echo "ANDROID_KEYSTORE_PATH=${PWD}/private_keys/emwaver-upload.jks" >> "${GITHUB_ENV}"

      - name: Install Google Play service account key
        working-directory: android
        env:
          GOOGLE_PLAY_SERVICE_ACCOUNT_JSON: ${{ secrets.GOOGLE_PLAY_SERVICE_ACCOUNT_JSON }}
        run: |
          set -euo pipefail
          mkdir -p private_keys
          printf '%s' "${GOOGLE_PLAY_SERVICE_ACCOUNT_JSON}" > private_keys/google-play-service-account.json
          chmod 600 private_keys/google-play-service-account.json
          echo "GOOGLE_PLAY_JSON_KEY_PATH=${PWD}/private_keys/google-play-service-account.json" >> "${GITHUB_ENV}"

      - name: Upload to Google Play
        working-directory: android
        env:
          ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
        run: bundle exec fastlane android beta

      - name: Upload AAB artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: EMWaver-Android-AAB
          path: android/app/build/outputs/bundle/release/app-release.aab
          if-no-files-found: ignore
