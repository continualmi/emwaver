name: Windows EXE Release

on:
  workflow_dispatch:
    inputs:
      tag:
        description: "Existing GitHub Release tag to update; blank uses VERSION"
        required: false
        default: ""

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest
    env:
      HAS_WINDOWS_CODE_SIGNING_CERT: ${{ secrets.WINDOWS_CODE_SIGNING_CERT_BASE64 != '' }}

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Resolve release tag and version
        shell: pwsh
        env:
          INPUT_TAG: ${{ inputs.tag }}
          REF_NAME: ${{ github.ref_name }}
          REF_TYPE: ${{ github.ref_type }}
        run: |
          $releaseTag = $env:INPUT_TAG
          if (-not $releaseTag -and $env:REF_TYPE -eq "tag") {
            $releaseTag = $env:REF_NAME
          }
          if (-not $releaseTag) {
            $releaseTag = (Get-Content VERSION -Raw).Trim()
          }

          if ($releaseTag -match '^\d+\.\d+\.\d+([.-].*)?$') {
            $version = $releaseTag
          } else {
            $version = (Get-Content VERSION -Raw).Trim()
          }
          $assemblyVersion = if ($version -match '^\d+\.\d+\.\d+$') { "$version.0" } else { "1.0.2.0" }
          "EMWAVER_RELEASE_TAG=$releaseTag" | Out-File -FilePath $env:GITHUB_ENV -Append
          "EMWAVER_RELEASE_VERSION=$version" | Out-File -FilePath $env:GITHUB_ENV -Append
          "EMWAVER_WINDOWS_ASSEMBLY_VERSION=$assemblyVersion" | Out-File -FilePath $env:GITHUB_ENV -Append
          Write-Host "Resolved release tag: $releaseTag"
          Write-Host "Resolved Windows version: $version ($assemblyVersion)"

      - name: Set up .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "10.0.x"

      - name: Restore Windows app
        working-directory: windows
        run: dotnet restore EMWaver.sln

      - name: Set up Python for ESP helper
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Build ESP flashing helper
        shell: pwsh
        run: |
          python -m pip install --upgrade pip
          python -m pip install PyInstaller esptool pyserial
          python tools/emwaver-esp-helper/build_helper.py

      - name: Publish Windows app
        working-directory: windows
        shell: pwsh
        run: |
          $shortSha = "${{ github.sha }}".Substring(0, 7)
          $projectXml = [xml](Get-Content EMWaver/EMWaver.csproj -Raw)
          $appVersion = ($projectXml.Project.PropertyGroup | ForEach-Object { $_.VersionPrefix } | Where-Object { $_ } | Select-Object -First 1)
          if (-not $appVersion) { $appVersion = "1.0.2" }
          dotnet publish EMWaver/EMWaver.csproj `
            --configuration Release `
            --runtime win-x64 `
            --self-contained false `
            --output ../dist/windows-x64 `
            /p:InformationalVersion="$appVersion+$shortSha"

      - name: Install Inno Setup
        shell: pwsh
        run: choco install innosetup --no-progress -y

      - name: Import code-signing certificate
        if: ${{ env.HAS_WINDOWS_CODE_SIGNING_CERT == 'true' }}
        shell: pwsh
        env:
          WINDOWS_CODE_SIGNING_CERT_BASE64: ${{ secrets.WINDOWS_CODE_SIGNING_CERT_BASE64 }}
          WINDOWS_CODE_SIGNING_CERT_PASSWORD: ${{ secrets.WINDOWS_CODE_SIGNING_CERT_PASSWORD }}
        run: |
          $certPath = Join-Path $env:RUNNER_TEMP "emwaver-codesign.pfx"
          [IO.File]::WriteAllBytes($certPath, [Convert]::FromBase64String($env:WINDOWS_CODE_SIGNING_CERT_BASE64))
          $password = ConvertTo-SecureString $env:WINDOWS_CODE_SIGNING_CERT_PASSWORD -AsPlainText -Force
          Import-PfxCertificate -FilePath $certPath -CertStoreLocation Cert:\CurrentUser\My -Password $password | Out-Null

      - name: Sign published Windows binaries
        if: ${{ env.HAS_WINDOWS_CODE_SIGNING_CERT == 'true' }}
        shell: pwsh
        env:
          WINDOWS_SIGNING_TIMESTAMP_URL: ${{ secrets.WINDOWS_SIGNING_TIMESTAMP_URL }}
        run: |
          $timestampUrl = if ($env:WINDOWS_SIGNING_TIMESTAMP_URL) { $env:WINDOWS_SIGNING_TIMESTAMP_URL } else { "http://timestamp.digicert.com" }
          $signtool = Get-ChildItem "${env:ProgramFiles(x86)}\Windows Kits\10\bin" -Recurse -Filter signtool.exe |
            Where-Object { $_.FullName -match "\\x64\\signtool\.exe$" } |
            Sort-Object FullName -Descending |
            Select-Object -First 1
          if (-not $signtool) { throw "signtool.exe was not found." }
          Get-ChildItem dist/windows-x64 -Recurse -Include *.exe,*.dll |
            ForEach-Object {
              & $signtool.FullName sign /fd SHA256 /tr $timestampUrl /td SHA256 /a $_.FullName
            }

      - name: Package Windows app
        shell: pwsh
        run: Compress-Archive -Path dist/windows-x64/* -DestinationPath dist/EMWaver-windows-x64.zip -Force

      - name: Build Windows installer
        shell: pwsh
        run: |
          $version = $env:EMWAVER_RELEASE_VERSION
          $version = $version -replace '[^0-9A-Za-z\.\-_]', '-'
          & "${env:ProgramFiles(x86)}\Inno Setup 6\ISCC.exe" windows/installer/EMWaver.iss "/DAppVersion=$version"

      - name: Sign Windows installer
        if: ${{ env.HAS_WINDOWS_CODE_SIGNING_CERT == 'true' }}
        shell: pwsh
        env:
          WINDOWS_SIGNING_TIMESTAMP_URL: ${{ secrets.WINDOWS_SIGNING_TIMESTAMP_URL }}
        run: |
          $timestampUrl = if ($env:WINDOWS_SIGNING_TIMESTAMP_URL) { $env:WINDOWS_SIGNING_TIMESTAMP_URL } else { "http://timestamp.digicert.com" }
          $signtool = Get-ChildItem "${env:ProgramFiles(x86)}\Windows Kits\10\bin" -Recurse -Filter signtool.exe |
            Where-Object { $_.FullName -match "\\x64\\signtool\.exe$" } |
            Sort-Object FullName -Descending |
            Select-Object -First 1
          if (-not $signtool) { throw "signtool.exe was not found." }
          & $signtool.FullName sign /fd SHA256 /tr $timestampUrl /td SHA256 /a dist/EMWaverSetup-windows-x64.exe

      - name: Generate Windows update manifest
        shell: pwsh
        run: |
          $installer = "dist/EMWaverSetup-windows-x64.exe"
          $hash = (Get-FileHash -Algorithm SHA256 $installer).Hash.ToLowerInvariant()
          $size = (Get-Item $installer).Length
          $tag = $env:EMWAVER_RELEASE_TAG
          $version = $env:EMWAVER_RELEASE_VERSION
          $manifest = [ordered]@{
            version = $version
            url = "https://github.com/continualmi/emwaver/releases/download/$tag/EMWaverSetup-windows-x64.exe"
            sha256 = $hash
            size = $size
            notes = "https://github.com/continualmi/emwaver/releases/tag/$tag"
            publishedAt = (Get-Date).ToUniversalTime().ToString("yyyy-MM-ddTHH:mm:ssZ")
            minimumSupportedVersion = "1.0.0"
          }
          $manifest | ConvertTo-Json -Depth 4 | Out-File -FilePath dist/emwaver-windows-update.json -Encoding utf8

      - name: Verify target GitHub Release exists
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh release view "$env:EMWAVER_RELEASE_TAG" --json tagName,url

      - name: Upload workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: EMWaver-windows-x64
          path: |
            dist/EMWaverSetup-windows-x64.exe
            dist/EMWaver-windows-x64.zip
            dist/emwaver-windows-update.json

      - name: Publish release asset
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ env.EMWAVER_RELEASE_TAG }}
          prerelease: false
          make_latest: true
          overwrite_files: true
          fail_on_unmatched_files: true
          files: |
            dist/EMWaverSetup-windows-x64.exe
            dist/EMWaver-windows-x64.zip
            dist/emwaver-windows-update.json
