name: Gateway CI

on:
  pull_request:
    paths:
      - "gateway/**"
      - ".github/workflows/gateway-ci.yml"
  push:
    branches:
      - main
    paths:
      - "gateway/**"
      - ".github/workflows/gateway-ci.yml"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  verify:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: gateway/frontend/package-lock.json

      - name: Install gateway dependencies
        working-directory: gateway/frontend
        run: npm ci

      - name: Verify gateway
        working-directory: gateway/frontend
        run: npm run verify
