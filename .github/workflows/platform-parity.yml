name: Platform Feature Parity

on:
  pull_request:
    paths:
      - "android/**"
      - "apple/**"
      - "ios/**"
      - "macos/**"
      - "windows/**"
      - "docs/parity/**"
      - "scripts/parity/**"
      - ".github/workflows/platform-parity.yml"
  push:
    branches:
      - main
    paths:
      - "android/**"
      - "apple/**"
      - "ios/**"
      - "macos/**"
      - "windows/**"
      - "docs/parity/**"
      - "scripts/parity/**"
      - ".github/workflows/platform-parity.yml"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  parity:
    name: Static parity contract
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Verify platform feature parity contract
        run: node scripts/parity/verify-platform-parity.mjs
