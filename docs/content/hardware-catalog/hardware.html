    <script>
      const el = {
        optGpio: document.getElementById("opt-gpio"),
        optCc1101: document.getElementById("opt-cc1101"),
        optIr: document.getElementById("opt-ir"),
        optUsbMale: document.getElementById("opt-usb-male"),
        optUsbFemale: document.getElementById("opt-usb-female"),
        dlCase: document.getElementById("dl-case"),
      };

      function enforceUsbAtLeastOne(changedEl) {
        const male = !!el.optUsbMale?.checked;
        const female = !!el.optUsbFemale?.checked;

        if (!male && !female) {
          // If the user tries to uncheck the last one, keep it.
          if (changedEl) changedEl.checked = true;
          else el.optUsbMale.checked = true;
        }
      }

      function render() {
        // Placeholders until per-variant files land in-repo.
        if (el.dlCase) {
          el.dlCase.href = "#";
          el.dlCase.setAttribute("aria-disabled", "true");
          el.dlCase.classList.add("pointer-events-none", "opacity-50");
        }
      }

      function attach() {
        [el.optGpio, el.optCc1101, el.optIr].forEach((x) => x?.addEventListener("change", render));

        if (el.optUsbMale) {
          el.optUsbMale.addEventListener("change", () => {
            enforceUsbAtLeastOne(el.optUsbMale);
            render();
          });
        }

        if (el.optUsbFemale) {
          el.optUsbFemale.addEventListener("change", () => {
            enforceUsbAtLeastOne(el.optUsbFemale);
            render();
          });
        }

        enforceUsbAtLeastOne();
        render();
      }

      attach();
    </script>
