    <style>
      :root {

      }

      /* Dark-only overrides (kept local to this page). */
      .bg-white\/70 { background-color: rgba(2, 6, 23, 0.55) !important; }
      .bg-white\/80 { background-color: rgba(2, 6, 23, 0.45) !important; }
      .bg-white { background-color: rgba(2, 6, 23, 0.28) !important; }
      .bg-slate-50 { background-color: rgba(15, 23, 42, 0.55) !important; }
      .bg-slate-100 { background-color: rgba(15, 23, 42, 0.65) !important; }
      .border-slate-200 { border-color: rgba(148, 163, 184, 0.18) !important; }
      .border-white\/40 { border-color: rgba(255, 255, 255, 0.10) !important; }
      .text-slate-900 { color: rgba(248, 250, 252, 0.96) !important; }
      .text-slate-700 { color: rgba(226, 232, 240, 0.86) !important; }
      .text-slate-600 { color: rgba(226, 232, 240, 0.72) !important; }
      .text-slate-500 { color: rgba(226, 232, 240, 0.60) !important; }

      .text-slate-300 { color: rgba(226, 232, 240, 0.35) !important; }
      .fade-in {
        animation: fade 280ms ease-out both;

      @keyframes fade {
        from {
          opacity: 0;
          transform: translateY(6px);
        }
        to {
          opacity: 1;
          transform: translateY(0);

      }

    <script>
      const el = {
        optGpio: document.getElementById("opt-gpio"),
        optCc1101: document.getElementById("opt-cc1101"),
        optIr: document.getElementById("opt-ir"),
        optUsbMale: document.getElementById("opt-usb-male"),
        optUsbFemale: document.getElementById("opt-usb-female"),
        dlCase: document.getElementById("dl-case"),
        boardHero: document.getElementById("board-hero"),
        boardGallery: document.getElementById("board-gallery"),
        featureGroup: document.getElementById("feature-group"),
        featureGroupMsg: document.getElementById("feature-group-msg"),
        usbGroup: document.getElementById("usb-group"),
        usbGroupMsg: document.getElementById("usb-group-msg"),
      };

      const BOARD_IMAGES = {
        all: "hardware/emwaver/emwaver_all.png",
        allIso: "downloads/emwaver.png",
        noGpio: "hardware/emwaver/emwaver_no_gpio.png",
        noIsm: "hardware/emwaver/emwaver_no_ism.png",
        noIsmNoGpio: "hardware/emwaver/emwaver_no_ism_no_gpio.png",
        noIr: "hardware/emwaver/emwaver_no_ir.png",
        noIrNoGpio: "hardware/emwaver/emwaver_no_ir_no_gpio.png",
        noIrNoIsm: "hardware/emwaver/emwaver_no_ir_no_ism.png",
      };

      const VARIANT_GALLERY = {
        all: [BOARD_IMAGES.all, BOARD_IMAGES.allIso],
        noGpio: [BOARD_IMAGES.noGpio],
        noIsm: [BOARD_IMAGES.noIsm],
        noIsmNoGpio: [BOARD_IMAGES.noIsmNoGpio],
        noIr: [BOARD_IMAGES.noIr],
        noIrNoGpio: [BOARD_IMAGES.noIrNoGpio],
        noIsmNoIr: [BOARD_IMAGES.noIrNoIsm],
      };

      let galleryVariantKey = null;
      const selectedHeroByVariant = {};

      let clearFeatureGroupFlashTimer = null;
      let clearUsbGroupFlashTimer = null;

      function flashConstraint(groupEl, msgEl, message, kind) {
        if (!groupEl || !msgEl) return;

        msgEl.textContent = message;
        msgEl.classList.remove("hidden");
        groupEl.classList.add("ring-2");

        if (kind === "usb") {
          groupEl.classList.add("ring-red-500/70", "bg-red-500/5");
        } else {
          groupEl.classList.add("ring-red-500/70", "bg-red-500/5");
        }

        if (kind === "usb") {
          if (clearUsbGroupFlashTimer) window.clearTimeout(clearUsbGroupFlashTimer);
          clearUsbGroupFlashTimer = window.setTimeout(() => {
            msgEl.classList.add("hidden");
            groupEl.classList.remove("ring-2", "ring-red-500/70", "bg-red-500/5");
          }, 1800);
        } else {
          if (clearFeatureGroupFlashTimer) window.clearTimeout(clearFeatureGroupFlashTimer);
          clearFeatureGroupFlashTimer = window.setTimeout(() => {
            msgEl.classList.add("hidden");
            groupEl.classList.remove("ring-2", "ring-red-500/70", "bg-red-500/5");
          }, 1800);
        }
      }

      function enforceUsbAtLeastOne(changedEl) {
        const male = !!el.optUsbMale?.checked;
        const female = !!el.optUsbFemale?.checked;

        if (!male && !female) {
          // If the user tries to uncheck the last one, keep it.
          if (changedEl) changedEl.checked = true;
          else el.optUsbMale.checked = true;

          flashConstraint(
            el.usbGroup,
            el.usbGroupMsg,
            "Pick at least one USB-C connector (male or female).",
            "usb",
          );
        }
      }

      function enforceFeaturesAtLeastOne(changedEl) {
        const gpio = !!el.optGpio?.checked;
        const cc1101 = !!el.optCc1101?.checked;
        const ir = !!el.optIr?.checked;

        if (!gpio && !cc1101 && !ir) {
          if (changedEl) changedEl.checked = true;
          else el.optIr.checked = true;

          flashConstraint(
            el.featureGroup,
            el.featureGroupMsg,
            "Pick at least one feature: GPIO, CC1101, or Infrared.",
            "feature",
          );
        }
      }

      function pickVariantKey() {
        const gpio = !!el.optGpio?.checked;
        const cc1101 = !!el.optCc1101?.checked;
        const ir = !!el.optIr?.checked;

        if (gpio && cc1101 && ir) return "all";
        if (!gpio && cc1101 && ir) return "noGpio";
        if (gpio && !cc1101 && ir) return "noIsm";
        if (!gpio && !cc1101 && ir) return "noIsmNoGpio";

        if (gpio && cc1101 && !ir) return "noIr";
        if (!gpio && cc1101 && !ir) return "noIrNoGpio";
        if (gpio && !cc1101 && !ir) return "noIsmNoIr";

        // Disallowed by constraints (and may occur briefly during toggles).
        return "all";
      }

      function getGalleryForVariant(variantKey) {
        return VARIANT_GALLERY[variantKey] || VARIANT_GALLERY.all;
      }

      function pickBoardImageSrc() {
        const variantKey = pickVariantKey();
        const gallery = getGalleryForVariant(variantKey);
        const preferred = selectedHeroByVariant[variantKey];
        if (preferred && gallery.includes(preferred)) return preferred;
        return gallery[0] || BOARD_IMAGES.all;
      }

      function setActiveGalleryImage(src) {
        if (!el.boardGallery) return;
        const buttons = el.boardGallery.querySelectorAll("button.board-thumb");
        buttons.forEach((b) => {
          const isActive = b.getAttribute("data-src") === src;
          b.classList.toggle("is-active", isActive);
        });
      }

      function ensureGallery(variantKey) {
        if (!el.boardGallery) return;

        if (galleryVariantKey === variantKey) return;
        galleryVariantKey = variantKey;

        const images = getGalleryForVariant(variantKey);

        el.boardGallery.innerHTML = "";

        images.forEach((src, idx) => {
          const btn = document.createElement("button");
          btn.type = "button";
          btn.className =
            "board-thumb relative shrink-0 w-14 h-14 rounded-xl overflow-hidden bg-white/5 hover:bg-white/10 transition";
          btn.setAttribute("data-src", src);
          btn.setAttribute("aria-label", `Board view ${idx + 1}`);
          btn.innerHTML = `<img src="${src}" alt="Board view ${idx + 1}" loading="lazy" class="w-full h-full object-cover" />`;

          btn.addEventListener("click", () => {
            selectedHeroByVariant[variantKey] = src;
            if (el.boardHero) el.boardHero.setAttribute("src", src);
            setActiveGalleryImage(src);
          });

          el.boardGallery.appendChild(btn);
        });
      }

	      function render() {
	        const variantKey = pickVariantKey();
	        ensureGallery(variantKey);

	        const imgSrc = pickBoardImageSrc();
	        if (el.boardHero && el.boardHero.getAttribute("src") !== imgSrc) {
	          el.boardHero.setAttribute("src", imgSrc);
	        }
	        setActiveGalleryImage(imgSrc);

	        // Currently: single in-repo artifact set.
	        // Future: pick per-variant (GPIO/CC1101/IR/USB) BOM/CPL/Case.
	        if (el.dlCase) {
	          el.dlCase.removeAttribute("aria-disabled");
	          el.dlCase.classList.remove("pointer-events-none", "opacity-50");
	        }
	      }

      function attach() {
	        [el.optGpio, el.optCc1101, el.optIr].forEach((x) =>
	          x?.addEventListener("change", () => {
	            enforceFeaturesAtLeastOne(x);
	            render();
	          }),
	        );

        if (el.optUsbMale) {
          el.optUsbMale.addEventListener("change", () => {
            enforceUsbAtLeastOne(el.optUsbMale);
            render();
          });
        }

        if (el.optUsbFemale) {
          el.optUsbFemale.addEventListener("change", () => {
            enforceUsbAtLeastOne(el.optUsbFemale);
            render();
          });
        }

        enforceFeaturesAtLeastOne();
        enforceUsbAtLeastOne();
        render();
      }

      attach();
    </script>
  </body>
