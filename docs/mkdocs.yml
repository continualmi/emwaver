site_name: EMWaver
site_dir: docs
site_url: https://luispl77.github.io/emwaver/
docs_dir: content
repo_url: https://github.com/luispl77/emwaver
edit_uri: edit/main/docs/content/
theme:
  name: material
  features:
    - navigation.tabs
    - navigation.tabs.sticky
    - navigation.indexes
    - navigation.sections
    - navigation.expand
    - navigation.footer
  logo: logo.png
  favicon: logo.png
  toc:
    permalink: false
  palette:
    - scheme: slate
      primary: custom
      accent: custom
extra:
  toc:
    sidebar: false
  social:
    - icon: fontawesome/brands/youtube
      link: https://www.youtube.com/@EMWavers
      name: EMWavers on YouTube
nav:
  - Get Started:
      - EMWaver: overview.md
      - Installing & Using: installing-using.md
      - Infrared + Sub‑GHz Walkthrough: infrared-ism-walkthrough.md
  - Device:
      - Pinout: hardware/pinout.md
      - Current Device: hardware/device.md
      - Order on JLCPCB: hardware/build-reproduce.md
      - Board Evolution: hardware-catalog/index.md
  - Documentation:
      - EMWaver scripts: scripts.md
      - Firmware Update: documentation/firmware-update.md

extra_css:
  - styles/theme.css
  - styles/hide-toc.css
extra_javascript:
  - javascripts/copy-page-markdown.js
markdown_extensions:
  - attr_list
  - md_in_html
  - pymdownx.highlight
  - pymdownx.superfences
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg
