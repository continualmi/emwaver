site_name: EMWaver
site_dir: docs
site_url: https://luispl77.github.io/emwaver/
docs_dir: content
repo_url: https://github.com/luispl77/emwaver
edit_uri: edit/main/docs/content/
theme:
  name: material
  features:
    - navigation.tabs
    - navigation.tabs.sticky
    - navigation.indexes
    - navigation.sections
    - navigation.expand
    - navigation.footer
  logo: logo.png
  favicon: logo.png
  toc:
    permalink: false
  palette:
    - scheme: default
      primary: custom
      accent: custom
      toggle:
        icon: material/weather-night
        name: Switch to dark mode
    - scheme: slate
      primary: custom
      accent: custom
      toggle:
        icon: material/weather-sunny
        name: Switch to light mode
extra:
  toc:
    sidebar: false
  social:
    - icon: fontawesome/brands/youtube
      link: https://www.youtube.com/@EMWavers
      name: EMWavers on YouTube
nav:
  - Get Started:
      - EMWaver: overview.md
      - Installing & Using: installing-using.md
      - Infrared + Sub‑GHz Walkthrough: infrared-ism-walkthrough.md
  - Hardware:
      - Build & Reproduce: hardware-catalog/index.md
      - Written Guide: hardware/build-reproduce.md
  - Flashing Firmware:
      - Overview: flashing-firmware/index.md
      - STM32 (STM32F042): flashing-firmware/stm32.md
  - Documentation:
      - EMWaver CLI: documentation/cli.md
      - Daemon + CLI: documentation/daemon.md
      - Buffer: documentation/buffer.md
      - Wavelets: wavelets.md

extra_css:
  - styles/theme.css
  - styles/hide-toc.css
extra_javascript:
  - javascripts/copy-page-markdown.js
hooks:
  - hooks/embed_page_markdown.py
markdown_extensions:
  - attr_list
  - md_in_html
  - pymdownx.highlight
  - pymdownx.superfences
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg
