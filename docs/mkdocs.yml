site_name: EMWaver
site_dir: docs
site_url: https://emwavers.com/
docs_dir: content
theme:
  name: material
  features:
    - navigation.tabs
  logo: logo.png
  favicon: logo.png
  toc:
    permalink: false
  palette:
    - scheme: default
      primary: indigo
      accent: indigo
      toggle:
        icon: material/weather-night
        name: Switch to dark mode
    - scheme: slate
      primary: indigo
      accent: indigo
      toggle:
        icon: material/weather-sunny
        name: Switch to light mode
extra:
  toc:
    sidebar: false
nav:
  - Overview: overview.md
  - Hardware: hardware.md
  - Wavelets: wavelets.md
  - EMWaver DSL: emwaver-dsl.md
  - App Overview: documentation.md
  - Firmware Update: firmware.md
  - Store: https://emwavers.com/store

extra_css:
  - styles/hide-toc.css
markdown_extensions:
  - attr_list
  - md_in_html
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg
